<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню Бургерів</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

<div class="page-wrapper">
    <main class="menu-card">
        <div class="left-column">
            <div class="image-container"></div>
            <div class="promo-badge">
                <h1 class="promo-title">
                    БУРГЕР-<br>ITALIAN
                    <span class="exclamation">!</span>
                </h1>
                <p class="promo-price"><span class="highlight">УСЬОГО</span> 79 ГРН</p>
            </div>
        </div>

        <div class="right-column">
            <h2 class="section-title">Лови момент!</h2>
            
            <div class="menu-grid">
                <div class="menu-item">
                    <h3>MICHIGAN</h3>
                    <p class="price">64.00 ГРН</p>
                </div>
                <div class="menu-item">
                    <h3>Beef BBQ</h3>
                    <p class="price">59.00 ГРН</p>
                </div>
                <div class="menu-item">
                    <h3>Cheeseburger</h3>
                    <p class="price">59.00 ГРН</p>
                </div>
                <div class="menu-item">
                    <h3>KETCHUP ROOM</h3>
                    <p class="price">68.00 ГРН</p>
                </div>
                <div class="menu-item">
                    <h3>KETCHUP ROOM 2</h3>
                    <p class="price">72.00 ГРН</p>
                </div>
                <div class="menu-item">
                    <h3>ELVIS</h3>
                    <p class="price">55.00 ГРН</p>
                </div>
            </div>
        </div>
    </main>

    <div class="button-wrapper">
        <button class="btn-all-menu">ВСЕ МЕНЮ</button>
    </div>
</div>

</body>
</html>
